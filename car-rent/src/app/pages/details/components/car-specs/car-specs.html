<div class="specs-grid">

  <div class="spec-item">
    <span class="spec-label">Type Car</span>
    <span class="spec-value">{{ car.category }}</span>
  </div>

  <div class="spec-item">
    <span class="spec-label">Capacity</span>
    <span class="spec-value">{{ car.seats }} Person</span>
  </div>

  <div class="spec-item">
    <span class="spec-label">Steering</span>
    <span class="spec-value">{{ car.transmission }}</span>
  </div>

  <div class="spec-item">
    <span class="spec-label">Gasoline</span>
    <span class="spec-value">{{ car.fuelCapacity }}L</span>
  </div>

</div>
